  if(market&&market.length) lines.push([market,"#9aa0c0",1.2,"3 2"]);   // global market (VT)
  lines.push([strat,"#4a4f57",1.7,null]);
  for(const [data,color,wdt,dash] of lines){
    const p=document.createElementNS(ns,"polyline");
    p.setAttribute("points",data.map((v,i)=>xs(i).toFixed(1)+","+ys(v).toFixed(1)).join(" "));
    p.setAttribute("fill","none");p.setAttribute("stroke",color);p.setAttribute("stroke-width",wdt);
    if(dash) p.setAttribute("stroke-dasharray",dash);
    el.appendChild(p);
  }
}

function metricRows(s,b){
  const rows=[["Total return",pct(s.total_return),pct(b.total_return),true],
    ["CAGR",pct(s.cagr),pct(b.cagr),true],["Sharpe",num(s.sharpe),num(b.sharpe),true],
    ["Sortino",num(s.sortino),num(b.sortino),true],["Calmar",num(s.calmar),num(b.calmar),true],
    ["Max drawdown",pct(-s.max_drawdown),pct(-b.max_drawdown),false],
    ["Ann. vol",pct(s.ann_vol),pct(b.ann_vol),false]];
  let html=`<div class="h">Metric</div><div class="h v">Strategy</div><div class="h v">Buy &amp; hold</div>`;
  for(const [k,sv,bv,tone] of rows)
    html+=`<div class="k">${k}</div><div class="v ${tone?cls(parseFloat(sv)):''}">${sv}</div><div class="v">${bv}</div>`;
  return html;
}

function render(st){
  document.getElementById("method").textContent=st.header.method;
  const px=st.header.proxied||{};
  const pxkeys=Object.keys(px);
  const pxline=pxkeys.length
    ? " Pre-inception history for "+pxkeys.map(k=>k+" (proxied by "+px[k]+")").join(", ")+
      " is return-spliced from the passive proxy, scaled to join continuously at inception."
    : "";
  document.getElementById("gen").textContent="Generated "+st.header.generated+pxline;
  document.getElementById("books").innerHTML=st.books.map((bk,i)=>{
    const f=bk.fit, o=bk.oos;
    const yr=bk.by_year.map(r=>`<tr><td>${r.year}</td>
      <td class="${cls(r.strat)}">${pct(r.strat)}</td><td>${pct(r.bench)}</td></tr>`).join("");
    return `<section class="book">
      <h2>${bk.name}</h2>
      <div class="uni"><b>${bk.n_names}</b> names · ${bk.span[0]} → ${bk.span[1]} ·
        fit lookback <b>${f.lookback}</b>, continuation <b>${f.continuation}</b>
        on first ${(f.train_frac*100)|0}%</div>
      <div class="cmp">${metricRows(bk.strategy,bk.benchmark)}</div>
      ${bk.market ? `<p class="uni" style="margin:-6px 0 10px">${bk.market.label}: `+
        `CAGR <b>${pct(bk.market.summary.cagr)}</b> · Sharpe <b>${num(bk.market.summary.sharpe)}</b> · `+
        `max DD <b>${pct(-bk.market.summary.max_drawdown)}</b></p>` : ``}
      <div class="legend"><span><i style="background:#4a4f57"></i>Strategy</span>
        <span><i style="background:#b8bcc2"></i>Buy &amp; hold (universe)</span>
        ${bk.market ? '<span><i style="background:#9aa0c0"></i>Global market (VT)</span>' : ''}
        <span><i style="background:#cfcfd4"></i>in-sample / out-of-sample split</span></div>
      <svg class="eq" id="eq${i}" preserveAspectRatio="none"></svg>
      <div class="oos">
        <div class="b"><div class="t">In-sample (fit)</div>
          <div class="r"><span>Sharpe</span><b>${num(o.train.sharpe)}</b></div>
          <div class="r"><span>CAGR</span><b>${pct(o.train.cagr)}</b></div>
          <div class="r"><span>Max DD</span><b>${pct(-o.train.max_drawdown)}</b></div></div>
        <div class="b"><div class="t">Out-of-sample</div>
          <div class="r"><span>Sharpe</span><b class="${cls(o.test.sharpe)}">${num(o.test.sharpe)}</b></div>
          <div class="r"><span>CAGR</span><b class="${cls(o.test.cagr)}">${pct(o.test.cagr)}</b></div>
          <div class="r"><span>Max DD</span><b>${pct(-o.test.max_drawdown)}</b></div></div>
      </div>
      <details><summary>Returns by year (strategy vs buy &amp; hold)</summary>
        <table><thead><tr><th>Year</th><th>Strategy</th><th>Buy &amp; hold</th></tr></thead>
        <tbody>${yr}</tbody></table></details>
    </section>`;
  }).join("");
  requestAnimationFrame(()=>st.books.forEach((bk,i)=>{
    const el=document.getElementById("eq"+i); if(el) eqchart(el,bk.equity.strat,bk.equity.bench,bk.equity.split_frac,bk.equity.market);
  }));
}

async function load(){
  let s=window.__STATE__;
  if(!s){ try{ s=await (await fetch("/api/tearsheet")).json(); }catch(e){} }
  if(s) render(s);
}
load();
</script>
</body>
</html>
