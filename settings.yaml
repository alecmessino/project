# Live thresholds + model params for the MLB mean-reversion engine.
# Loaded by triggers.py and scripts/build_chart_history.py — never hardcode
# thresholds anywhere else.

model:
  # Reversion weight: share of remaining-game scoring projected at the pregame
  # rate (β=1 fully reverts) vs current pace (β=0 extrapolates the live rate).
  # Baseball pace data is noisier per half-inning than basketball per minute,
  # so we lean a touch more toward pregame than the NBA default.
  beta: 0.75

  # Standard deviation of the *final* total for each market (in runs). Scaled
  # by sqrt(remaining_half_innings / period_half_innings) inside the model.
  sigma_full: 2.6        # full 9-inning total
  sigma_f5:   1.7        # first-5-innings total
  sigma_team: 1.8        # per-team run total

  # Don't trust observed pace until at least this many half-innings have completed
  # (avoids a single big inning whipsawing the projection).
  min_half_innings_elapsed: 2

triggers:
  # Minimum absolute line move vs pregame (fraction). 0.12 = line moved >= 12%.
  pct_move_threshold: 0.12

  # Minimum model edge in RUNS (|fair_final - market_line|).
  edge_runs_threshold: 2.5

  # Minimum EV per $1 staked at the offered odds to flag at all.
  ev_threshold: 0.0
  # EV at/above this is tagged "STRONG".
  ev_strong_threshold: 0.03

  # Minimum HALF-INNINGS remaining for the signal to be actionable
  # (gives the reversion time to play out).
  min_half_innings_remaining:
    full: 4
    f5:   2

staking:
  bankroll: 100.0
  kelly_fraction: 0.25
  max_stake_fraction: 0.05

engine:
  # We sample at the conclusion of every half-inning — 18 marks for a 9-inning
  # regulation game. (Same idea as the NBA timeout cadence, mapped to baseball's
  # discrete state.)
  cadence: half_inning
  markets:
    - total_full         # full-game over/under
    - total_f5           # first 5 innings
    - team_total         # per-team run total

notifications:
  desktop: true
  push:    true
  sms:     false
  discord: false         # set DISCORD_WEBHOOK_URL in env to enable
  slack:   false
  reissue_ev_delta: 0.02
