name: Refresh Driftwood exhibits

# Regenerates the Driftwood equity exhibits from Yahoo Finance daily bars
# data and commits them to docs/. The existing "Deploy to GitHub Pages" workflow
# then publishes docs/ on the resulting push to master.

on:
  schedule:
    - cron: '20 22 * * *'      # daily, 22:20 UTC (after the US equity close)
  workflow_dispatch:            # run on demand from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e ".[dev]"

      # Equity-only product — all exhibits keyless via Yahoo Finance (no secret).
      # Universe is the curated region × factor matrix (single source: drift.universes).
      - name: Build equity exhibits (docs/equities*.html)
        run: |
          EQUITIES=$(python -c "from drift.universes import EQUITIES, csv; print(csv(EQUITIES))")
          echo "universe: $EQUITIES"
          drift studies --source yahoo --instrument "$EQUITIES" \
            --config config/drift.yaml --out docs/equities_case_studies.html
          drift export --source yahoo --instrument "$EQUITIES" \
            --config config/drift.yaml --out docs/equities.html

      - name: Build long-history tearsheet (docs/tearsheet.html)
        run: drift tearsheet --config config/drift.yaml --out docs/tearsheet.html

      # Append one session to the append-only forward paper-trade ledger.
      - name: Advance forward ledger (docs/ledger.*)
        run: drift ledger --config config/drift.yaml

      # Tax Lab reads the fresh ledger's realized-gain profile (after the ledger step).
      - name: Build Tax Lab (docs/taxlab.html)
        run: drift taxlab --docs docs --out docs/taxlab.html

      # Thesis page pulls live figures from the fresh tearsheet + ledger.
      - name: Build thesis page (docs/thesis.html)
        run: drift thesis --docs docs --out docs/thesis.html

      # Rebuild the markets-only landing hub last (reads the fresh exhibits above).
      - name: Build landing hub (docs/index.html)
        run: drift hub --docs docs --out docs/index.html

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/thesis.html docs/taxlab.html \
            docs/equities.html docs/equities_case_studies.html docs/tearsheet.html \
            docs/ledger.html docs/ledger.json
          # Use an explicit if/else: the old `A && B || C && D` one-liner pushed even on a
          # no-change run (operator precedence), and a holiday no-op should commit nothing.
          if git diff --cached --quiet; then
            echo "no change — nothing to commit"
          else
            git commit -m "chore: refresh Driftwood exhibits [skip ci]"
            git push
          fi
