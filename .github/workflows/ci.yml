name: CI

# Loop-engineering gate: every PR to master must pass the Python suite AND the
# zero-dependency DOM-shim UI harness. Keyless and fully offline (no network/secrets).
on:
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e ".[dev]"
      - run: pytest -q

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node tests/web/run.js     # reads the src template; exits non-zero on any failed flow
