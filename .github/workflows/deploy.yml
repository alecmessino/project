name: Deploy dashboard to GitHub Pages

# Serves docs/ as the public site. Triggered on pushes to master/main and
# manual dispatch. Pages-only — no app build, no test job (those belong in a
# separate CI workflow once the engine has its own poller).

on:
  push:
    branches: [master, main]
    paths:
      - "docs/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deploy at a time; never cancel an in-progress publish.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload docs/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
