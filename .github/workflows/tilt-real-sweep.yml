name: Tilt hybrid sweep (real data)

# On-demand: pull the real ~40y proxy-spliced matrix via the Tiingo source chain (Tiingo can read
# the repo secret and isn't IP-banned from CI), commit it as a reproducible OFFLINE cache
# (tests/data/matrix_history.json), and run the tilt + lot-protection hybrid sweep on real markets —
# full sample + contiguous sub-periods. The matrices print to the run log. Research only; no shipped
# config or the live signal is touched.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sweep:
    runs-on: ubuntu-latest
    env:
      TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
      TILT_SWEEP_REAL: "1"
      TILT_SWEEP_REFRESH: "1"        # force a fresh pull, then commit the cache
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e ".[dev]"
      - name: Pull real data, cache it, run the hybrid sweep
        run: python scripts/tilt_sweep.py
      - name: Commit the offline cache if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/data/matrix_history.json
          if git diff --cached --quiet; then
            echo "cache unchanged — nothing to commit"
          else
            git commit -m "data: cache 40y proxy-spliced matrix for offline tilt sweeps [skip ci]"
            git push
          fi
