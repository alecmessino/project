name: Refresh Driftwood exhibits

# Regenerates the Driftwood equity exhibits from Yahoo Finance daily bars
# data and commits them to docs/. The existing "Deploy to GitHub Pages" workflow
# then publishes docs/ on the resulting push to master.

on:
  # schedule DISABLED — automation halted per request; uncomment to re-enable.
#  schedule:
#    - cron: '20 22 * * *'      # daily, 22:20 UTC (after the US equity close)
  workflow_dispatch:            # run on demand from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    # Yahoo IP-bans GitHub Actions runners; the ledger uses a Tiingo -> Stooq -> Yahoo source
    # chain. Add a free Tiingo token as the TIINGO_API_KEY repo secret for reliable updates.
    env:
      TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e ".[dev]"

      # Research-flag deploy gate: refuse to publish if a shipped config ever turns on the research-only
      # tilt_overlay / lot_protect (would advertise an unvalidated edge). Mirrors the pytest guard
      # test_shipped_configs_keep_research_flags_off so the nightly [skip ci] path is gated too.
      - name: Guard — research flags must be OFF before publishing
        run: |
          python - <<'PY'
          from drift.config import Settings
          for c in ("config/drift.yaml", "config/slow.yaml"):
              cs = Settings.load(c).cross_section
              assert cs.tilt_overlay is False and cs.lot_protect is False, f"{c}: research flags must be OFF"
          print("research-flag gate OK — tilt_overlay / lot_protect are off in all shipped configs")
          PY

      # Data fetched through the shared Tiingo->Stooq->Yahoo chain (feed.resolve). The LIVE ledger
      # runs FIRST so it gets a fresh Tiingo budget — the heavy 40y tearsheet pull runs last so its
      # retry storm can't starve the ledger/equities (the regression that froze the ledger RED).
      - name: Advance forward ledger (docs/ledger.*)
        run: drift ledger --config config/drift.yaml

      # Universe is the curated region × factor matrix (single source: drift.universes).
      - name: Build equity exhibits (docs/equities*.html)
        run: |
          EQUITIES=$(python -c "from drift.universes import EQUITIES, csv; print(csv(EQUITIES))")
          echo "universe: $EQUITIES"
          drift studies --source yahoo --instrument "$EQUITIES" \
            --config config/drift.yaml --out docs/equities_case_studies.html
          drift export --source yahoo --instrument "$EQUITIES" \
            --config config/drift.yaml --out docs/equities.html

      # Heaviest pull last (40y deep history); degrades gracefully (keeps prior tearsheet) if thin.
      - name: Build long-history tearsheet (docs/tearsheet.html)
        run: drift tearsheet --config config/drift.yaml --out docs/tearsheet.html

      # Tax Lab reads the fresh ledger's realized-gain profile (after the ledger step).
      - name: Build Tax Lab (docs/taxlab.html)
        run: drift taxlab --docs docs --out docs/taxlab.html

      # Thesis page pulls live figures from the fresh tearsheet + ledger.
      - name: Build thesis page (docs/thesis.html)
        run: drift thesis --docs docs --out docs/thesis.html

      # Tax-Leakage Diagnostic (Before/After pitch artifact; fixed Tax-Alpha figures).
      - name: Build Tax-Leakage Diagnostic (docs/leakage.html)
        run: drift leakage --out docs/leakage.html

      # Multi-dimension State Tax Map (cap-gains / marriage / estate / step-up / Structural Alpha).
      - name: Build State Tax Map (docs/statemap.html)
        run: drift statemap --out docs/statemap.html

      # Per-state SEO landing pages (50 + DC), states.html index, and the generated sitemap.
      - name: Build state landing pages + sitemap
        run: drift states --out-dir docs

      # Rebuild the markets-only landing hub last (reads the fresh exhibits above).
      - name: Build landing hub (docs/index.html)
        run: drift hub --docs docs --out docs/index.html

      # Rule 204-2 provenance: record the commit, data fingerprint, and claim->source map for this build.
      - name: Stamp provenance (docs/_provenance.json)
        run: python scripts/stamp_provenance.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/thesis.html docs/taxlab.html \
            docs/equities.html docs/equities_case_studies.html docs/tearsheet.html \
            docs/ledger.html docs/ledger.json docs/_provenance.json \
            docs/states.html docs/sitemap.xml docs/*-tax.html
          # Use an explicit if/else: the old `A && B || C && D` one-liner pushed even on a
          # no-change run (operator precedence), and a holiday no-op should commit nothing.
          if git diff --cached --quiet; then
            echo "no change — nothing to commit"
          else
            git commit -m "chore: refresh Driftwood exhibits [skip ci]"
            # Robust against a concurrent push (Pages deploy / a merge landing mid-run):
            # rebase onto the latest master and retry; fail loudly if it still can't push.
            pushed=0
            for attempt in 1 2 3; do
              if git push; then pushed=1; break; fi
              echo "push rejected — rebasing on origin/master (attempt $attempt)"
              git pull --rebase --autostash origin master || break
            done
            [ "$pushed" = 1 ] || { echo "::error::could not push refreshed exhibits after retries"; exit 1; }
          fi
