name: Notify test — verify secrets + send a test alert

# Manual only. Confirms which notification secrets are present (logs show presence
# + length, never the value) and fires one test "strong" alert through every
# configured channel so you can confirm it lands on your phone/desktop.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Verify secrets + send test alert
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_PING: ${{ secrets.DISCORD_PING }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER: ${{ secrets.NTFY_SERVER }}
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SMS_EMAIL_TARGET: ${{ secrets.SMS_EMAIL_TARGET }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scripts/notify_test.py
