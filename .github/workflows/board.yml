name: Refresh tonight's board

# Discovers a league's whole slate from Bovada and writes docs/board.json so the
# dashboard shows every game's pre-game Total/Spread/ML before tip — no per-game
# YAML needed. Run from the Actions tab (pick the league) before the slate; the
# cron is a best-effort top-up (GitHub throttles scheduled runs).

on:
  workflow_dispatch:
    inputs:
      league:
        description: "League to discover (nba locked for the Finals; wnba dispatchable)"
        required: true
        default: "nba"
  schedule:
    - cron: "*/15 * * * *"   # best-effort; dispatch is the reliable trigger

permissions:
  contents: write

concurrency:
  group: board-refresh
  cancel-in-progress: true

jobs:
  board:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Build board.json
        run: python scripts/board_update.py --league "${{ github.event.inputs.league || 'nba' }}"
      - name: Commit board.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/board.json docs/upcoming.json
          git diff --cached --quiet && echo "no change" || \
            git commit -m "chore: refresh tonight's board + upcoming [skip ci]" && git push
