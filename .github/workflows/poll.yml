name: Update live odds

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes (GitHub minimum)
  workflow_dispatch:         # also triggerable manually from the Actions tab

permissions:
  contents: write            # needed to push docs/state.json

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Fetch odds + update state (9-point cadence)
        run: python scripts/gh_pages_update.py
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          # Notification channels — empty/unset secrets simply no-op.
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          MRBET_GAME: config/games/sas_okc_2026-05-30.yaml   # WCF G7 (armed target)

      - name: Grade completed bets (no-op while game is in progress)
        run: python scripts/grade_forward.py
        env:
          MRBET_GAME: config/games/sas_okc_2026-05-30.yaml

      - name: Commit and push state + forward ledger
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/state.json docs/forward.json docs/odds_history.json config/games/
          git diff --cached --quiet && echo "no change" || \
            git commit -m "chore: update live state + forward ledger [skip ci]" && git push
