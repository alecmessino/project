name: Migrate scaffold → fair-value-territory

# One-shot manual migration. Pushes the contents of this repo's
# `mlb-scaffold-export` branch to the alecmessino/fair-value-territory
# repository, authenticating with a PAT stored as the MIGRATION_PAT secret.
#
# This file must live on the default branch (master) for the "Run workflow"
# button to appear. Delete it once the migration is done.

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Branch to create in fair-value-territory (match the new repo's default)"
        required: true
        default: "main"

permissions:
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the scaffold branch
        uses: actions/checkout@v4
        with:
          ref: mlb-scaffold-export
          fetch-depth: 0

      - name: Push to fair-value-territory
        env:
          MIGRATION_PAT: ${{ secrets.MIGRATION_PAT }}
          TARGET_BRANCH: ${{ github.event.inputs.target_branch }}
        run: |
          set -euo pipefail
          if [ -z "${MIGRATION_PAT:-}" ]; then
            echo "::error::MIGRATION_PAT secret is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Token is embedded in a remote (kept out of logs; GitHub also masks secrets).
          git remote add target "https://x-access-token:${MIGRATION_PAT}@github.com/alecmessino/fair-value-territory.git"

          echo "Pushing $(git rev-parse --short HEAD) (mlb-scaffold-export) → fair-value-territory:${TARGET_BRANCH}"
          if ! git push --force target "HEAD:refs/heads/${TARGET_BRANCH}" 2>push.log; then
            # Scrub any token that might surface in an error before printing.
            sed "s#x-access-token:[^@]*@#x-access-token:***@#g" push.log
            echo "::error::Push failed. Check that the PAT has 'contents:write' scope on fair-value-territory."
            exit 1
          fi
          echo "✅ Migration complete — mlb-scaffold-export pushed to fair-value-territory:${TARGET_BRANCH}"
