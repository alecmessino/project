# Global settings for the mean-reversion betting signal engine.
# All thresholds are tunable; see src/mrbet/config.py for the schema + defaults.

model:
  # Reversion weight beta in [0,1]: fraction of remaining-time scoring assumed to
  # revert to the pregame baseline rate. 1.0 = full reversion to baseline,
  # 0.0 = remaining play continues at the current observed pace.
  beta: 0.90   # raised from 0.70: reversion-fit on 79 real playoff games -> beta~1.0
  # Standard deviation of the FINAL total for a full game / team, used to build the
  # normal distribution around the projected fair final. Scaled by sqrt(r/L).
  sigma_full: 11.0
  sigma_team: 8.0
  # Minimum minutes elapsed before the current-pace term is trusted (avoids a
  # tiny early-game sample whipsawing the projection).
  min_minutes_elapsed: 5.0

triggers:
  # Minimum absolute line move vs pregame (fraction). Lowered 0.10 -> 0.04 for the
  # 5/30 G7 hot-start: the book tracks pace upward slowly, so a 10% move rarely
  # clears even when edge/EV are large. 0.04 lets strong-edge plays fire.
  pct_move_threshold: 0.04
  # Minimum model edge in points (|fair_final - market_line|).
  edge_pts_threshold: 3.0
  # Minimum expected value per $1 staked at the offered odds to flag at all.
  ev_threshold: 0.0
  # EV at/above this is tagged "STRONG".
  ev_strong_threshold: 0.03
  # Minimum minutes remaining in the relevant period for the signal to be actionable.
  min_minutes_remaining:
    full: 6.0
    half: 4.0
    quarter: 3.0

staking:
  bankroll: 85.12          # update to your real Bovada balance
  kelly_fraction: 0.25     # fractional Kelly (quarter Kelly)
  max_stake_fraction: 0.05 # never recommend staking more than this fraction of bankroll

engine:
  poll_interval_seconds: 60
  # Markets to track. Valid: total_full, total_h1, total_q1..q4, team_total
  markets:
    - total_full
    - total_h1
    - team_total
  # Warn / stop polling when remaining API credits drop below this.
  min_api_credits: 50
  # Sportsbook selection. We request a whole region in one call (cost = markets x
  # regions, NOT per book), then prefer these books in order. If none are present,
  # fall back to a consensus line across whatever books are available (lines are
  # similar across books, so a missing Bovada is not fatal).
  region: us
  books:
    - bovada
    - betonlineag
    - lowvig
    - mybookieag
    - betus
  fallback_consensus: true
  # Live sampling cadence (saves Odds API credits):
  #   interval -> poll every poll_interval_seconds (legacy).
  #   timeout  -> watch the FREE ESPN clock; spend a paid odds fetch only at the
  #               ~6:00/3:00 timeout marks + quarter break of Q1-Q3
  #               [6,9,12,18,21,24,30,33,36]. ~17x fewer credits; on 79 real
  #               playoff games it kept 86% of the opportunities dense polling found.
  cadence: timeout
  clock_poll_interval: 45   # seconds between free ESPN clock checks (timeout mode)

notifications:
  desktop: true
  push: true              # uses NTFY_TOPIC (or Pushover) from environment
  sms: true               # email-to-SMS gateway; set SMS_EMAIL_TARGET / SMTP_USERNAME / SMTP_PASSWORD in env (see .env.example)
  discord: true           # Discord webhook (phone push); set DISCORD_WEBHOOK_URL in env (see .env.example)
  slack: false            # Slack webhook; set SLACK_WEBHOOK_URL in env and flip to true to enable
  # Re-alert on the same signal only if EV improves by at least this much.
  reissue_ev_delta: 0.02
