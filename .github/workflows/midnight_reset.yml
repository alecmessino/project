name: Midnight reset → load NBA slate

# Every night at 12:05 AM ET (04:05 UTC) wipe the previous day's board and
# pre-load the upcoming NBA Finals lines, so the dashboard is fresh by morning.
# Also runnable on demand (pick a league). NOTE: GitHub throttles scheduled jobs
# and may start a few minutes late — fine for an overnight reset.

on:
  schedule:
    - cron: "5 4 * * *"          # 04:05 UTC = 12:05 AM ET (EDT)
  workflow_dispatch:
    inputs:
      league:
        description: "League to load (default nba)"
        required: true
        default: "nba"

permissions:
  contents: write

concurrency:
  group: board-refresh           # never overlap with the board.yml refresh
  cancel-in-progress: true

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Load NBA slate into docs/board.json (wipes the old league's data)
        run: python scripts/board_update.py --league "${{ github.event.inputs.league || 'nba' }}"

      - name: Commit refreshed board
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/board.json docs/upcoming.json
          git diff --cached --quiet && echo "no change" || \
            git commit -m "chore: midnight reset — load next-day slate [skip ci]" && git push
