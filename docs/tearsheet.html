<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Driftwood — long-history tearsheet</title>
<style>
  :root{
    --bg:#ffffff; --soft:#fafafa; --line:#e8e8ea; --ink:#1b1b1f; --dim:#717179;
    --pos:#2f6f5b; --neg:#9b4439; --slate:#4a4f57; --rule:#222226; --bench:#b8bcc2;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:15px/1.65 ui-sans-serif,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased}
  .wrap{max-width:900px;margin:0 auto;padding:56px 28px 80px}
  header{border-top:3px solid var(--rule);padding-top:20px}
  header h1{font-size:25px;margin:0 0 6px;font-weight:650;letter-spacing:-.2px}
  header h1 .w{color:var(--slate)}
  .method{color:var(--dim);font-size:13.5px;max-width:70ch;margin:6px 0 0}
  .book{padding:30px 0;border-top:1px solid var(--line);margin-top:8px}
  .book h2{font-size:19px;margin:0 0 2px;font-weight:640}
  .book .uni{color:var(--dim);font-size:12.5px;margin-bottom:16px}
  .book .uni b{color:var(--ink)}
  .cmp{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:0 14px;font-variant-numeric:tabular-nums;
    border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-bottom:18px}
  .cmp>div{padding:8px 12px;border-bottom:1px solid var(--line)}
  .cmp .h{background:var(--soft);font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--dim)}
  .cmp .k{color:var(--dim)}
  .cmp .v{text-align:right;font-weight:600}
  .cmp>div:nth-last-child(-n+3){border-bottom:none}
  .pos{color:var(--pos)} .neg{color:var(--neg)}
  svg.eq{display:block;width:100%;height:150px;margin:6px 0 4px}
  .legend{font-size:12px;color:var(--dim);display:flex;gap:18px;margin-bottom:14px}
  .legend i{display:inline-block;width:14px;height:2px;vertical-align:middle;margin-right:5px}
  .oos{display:flex;gap:26px;flex-wrap:wrap;margin:6px 0 16px;font-size:13px}
  .oos .b{border:1px solid var(--line);border-radius:8px;padding:10px 14px;min-width:150px}
  .oos .b .t{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);margin-bottom:4px}
  .oos .b .r{display:flex;justify-content:space-between;gap:14px}
  table{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums;font-size:13px;margin-top:6px}
  th,td{padding:6px 10px;text-align:right;border-bottom:1px solid var(--line)}
  th:first-child,td:first-child{text-align:left}
  thead th{color:var(--dim);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.5px;
    border-bottom:1px solid var(--rule)}
  .foot{margin-top:36px;padding-top:16px;border-top:1px solid var(--line);color:var(--dim);font-size:12.5px}
  .foot .note{color:var(--slate)}
  details{margin-top:10px} summary{cursor:pointer;color:var(--slate);font-size:12.5px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Drift<span class="w">wood</span> · long-history tearsheet</h1>
    <p class="method" id="method"></p>
  </header>
  <div id="books"></div>
  <div class="foot">
    <span class="note">Signal system — research only, not investment advice.</span>
    Out-of-sample = the held-out remainder after parameters were fit on the in-sample
    head; net of modeled transaction cost. Past performance does not predict future results.
    <div id="gen" style="margin-top:6px"></div>
  </div>
</div>

function pct(x){ return (x>=0?"+":"")+(x*100).toFixed(1)+"%"; }
function cls(x){ return x>0?"pos":x<0?"neg":""; }
function num(x){ return x==null ? "∞" : x.toFixed(2); }

function eqchart(el, strat, bench, splitFrac){
  el.innerHTML=""; if(!strat||strat.length<2) return;
  const w=el.clientWidth||820,h=el.clientHeight||150,pad=4;
  const all=strat.concat(bench).map(v=>Math.log(Math.max(v,1e-6)));
  const lo=Math.min(...all),hi=Math.max(...all),rng=(hi-lo)||1;
  const xs=i=>pad+(w-2*pad)*i/(strat.length-1);
  const ys=v=>h-pad-(h-2*pad)*(Math.log(Math.max(v,1e-6))-lo)/rng;
  const ns="http://www.w3.org/2000/svg";
  // in-sample / out-of-sample divider
  const sx=pad+(w-2*pad)*splitFrac;
  const sep=document.createElementNS(ns,"line");
  sep.setAttribute("x1",sx);sep.setAttribute("x2",sx);sep.setAttribute("y1",pad);sep.setAttribute("y2",h-pad);
  sep.setAttribute("stroke","#cfcfd4");sep.setAttribute("stroke-dasharray","3 3");el.appendChild(sep);
  for(const [data,color,wdt] of [[bench,"#b8bcc2",1.3],[strat,"#4a4f57",1.7]]){
    const p=document.createElementNS(ns,"polyline");
    p.setAttribute("points",data.map((v,i)=>xs(i).toFixed(1)+","+ys(v).toFixed(1)).join(" "));
    p.setAttribute("fill","none");p.setAttribute("stroke",color);p.setAttribute("stroke-width",wdt);
    el.appendChild(p);
  }
}

function metricRows(s,b){
  const rows=[["Total return",pct(s.total_return),pct(b.total_return),true],
    ["CAGR",pct(s.cagr),pct(b.cagr),true],["Sharpe",num(s.sharpe),num(b.sharpe),true],
    ["Sortino",num(s.sortino),num(b.sortino),true],["Calmar",num(s.calmar),num(b.calmar),true],
    ["Max drawdown",pct(-s.max_drawdown),pct(-b.max_drawdown),false],
    ["Ann. vol",pct(s.ann_vol),pct(b.ann_vol),false]];
  let html=`<div class="h">Metric</div><div class="h v">Strategy</div><div class="h v">Buy &amp; hold</div>`;
  for(const [k,sv,bv,tone] of rows)
    html+=`<div class="k">${k}</div><div class="v ${tone?cls(parseFloat(sv)):''}">${sv}</div><div class="v">${bv}</div>`;
  return html;
}

function render(st){
  document.getElementById("method").textContent=st.header.method;
  document.getElementById("gen").textContent="Generated "+st.header.generated;
  document.getElementById("books").innerHTML=st.books.map((bk,i)=>{
    const f=bk.fit, o=bk.oos;
    const yr=bk.by_year.map(r=>`<tr><td>${r.year}</td>
      <td class="${cls(r.strat)}">${pct(r.strat)}</td><td>${pct(r.bench)}</td></tr>`).join("");
    return `<section class="book">
      <h2>${bk.name}</h2>
      <div class="uni"><b>${bk.n_names}</b> names · ${bk.span[0]} → ${bk.span[1]} ·
        fit lookback <b>${f.lookback}</b>, continuation <b>${f.continuation}</b>
        on first ${(f.train_frac*100)|0}%</div>
      <div class="cmp">${metricRows(bk.strategy,bk.benchmark)}</div>
      <div class="legend"><span><i style="background:#4a4f57"></i>Strategy</span>
        <span><i style="background:#b8bcc2"></i>Buy &amp; hold</span>
        <span><i style="background:#cfcfd4"></i>in-sample / out-of-sample split</span></div>
      <svg class="eq" id="eq${i}" preserveAspectRatio="none"></svg>
      <div class="oos">
        <div class="b"><div class="t">In-sample (fit)</div>
          <div class="r"><span>Sharpe</span><b>${num(o.train.sharpe)}</b></div>
          <div class="r"><span>CAGR</span><b>${pct(o.train.cagr)}</b></div>
          <div class="r"><span>Max DD</span><b>${pct(-o.train.max_drawdown)}</b></div></div>
        <div class="b"><div class="t">Out-of-sample</div>
          <div class="r"><span>Sharpe</span><b class="${cls(o.test.sharpe)}">${num(o.test.sharpe)}</b></div>
          <div class="r"><span>CAGR</span><b class="${cls(o.test.cagr)}">${pct(o.test.cagr)}</b></div>
          <div class="r"><span>Max DD</span><b>${pct(-o.test.max_drawdown)}</b></div></div>
      </div>
      <details><summary>Returns by year (strategy vs buy &amp; hold)</summary>
        <table><thead><tr><th>Year</th><th>Strategy</th><th>Buy &amp; hold</th></tr></thead>
        <tbody>${yr}</tbody></table></details>
    </section>`;
  }).join("");
  requestAnimationFrame(()=>st.books.forEach((bk,i)=>{
    const el=document.getElementById("eq"+i); if(el) eqchart(el,bk.equity.strat,bk.equity.bench,bk.equity.split_frac);
  }));
}

async function load(){
  let s=window.__STATE__;
  if(!s){ try{ s=await (await fetch("/api/tearsheet")).json(); }catch(e){} }
  if(s) render(s);
}
load();
</script>
