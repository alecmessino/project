name: Refresh backtest data

on:
  schedule:
    - cron: '0 12 * * 1'      # weekly, Monday 12:00 UTC (games change slowly)
  workflow_dispatch:           # run on demand from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e ".[dev]"

      # Free ESPN data only — no ODDS_API_KEY needed.
      - name: Rebuild docs/backtest.json
        run: python scripts/build_backtest_json.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/backtest.json
          git diff --cached --quiet && echo "no change" || \
            git commit -m "chore: refresh backtest data [skip ci]" && git push
