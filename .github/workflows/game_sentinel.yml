name: Game sentinel — auto-start the live tracker

# Reliability layer over the schedule. Runs FREQUENTLY: every tick it asks Bovada
# whether any NBA/WNBA game is live and, if so and no tracker is running, dispatches
# live_game_tracker.yml. If a live game has no config, it AUTO-GENERATES one from the
# discovered Bovada metadata (so any game tracks with zero hand-config). Re-checking
# every few minutes both catches the tip (even if cron ticks slip) and RESTARTS the
# tracker if it dies mid-game.

on:
  # schedule DISABLED — automation halted per request; uncomment to re-enable.
#  schedule:
#    # Every 10 min, all day. Multi-league now (NBA + WNBA): WNBA weekend games tip
#    # as early as ~1 PM ET (17:00 UTC) and NBA runs late, so a fixed evening window
#    # would miss games. The job is ~15s and the repo is public (free minutes), and
#    # the redundancy across many ticks beats GitHub's flaky single-cron timing.
#    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write             # push auto-generated game configs
  actions: write              # dispatch the tracker workflow

concurrency:
  group: game-sentinel
  cancel-in-progress: true

jobs:
  sentinel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package (Bovada discovery + config generation)
        run: pip install -e ".[dev]"

      - name: Ensure tracker is running if a game is live
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TRACKER_WORKFLOW: live_game_tracker.yml
          TRACKER_REF: master
          TRACKER_MAX_MINUTES: "210"
        run: python scripts/game_sentinel.py
