name: Update live odds

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes (GitHub minimum)
  workflow_dispatch:         # also triggerable manually from the Actions tab

permissions:
  contents: write            # needed to push docs/state.json

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Fetch odds + update state
        run: python scripts/gh_pages_update.py
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Commit and push state.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/state.json
          git diff --cached --quiet && echo "no change" || \
            git commit -m "chore: update live state [skip ci]" && git push
